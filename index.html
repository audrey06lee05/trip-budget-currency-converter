<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Budget Tracker</title>
    <link rel="stylesheet" href="style.css" />
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  </head>
  <body>
    <header>
      <label for="baseCurrency">Base Currency:</label>
      <select id="baseCurrency">
        <option value="">Choose Base Currency</option>
      </select>
      <p id="totalSpend"></p>
    </header>
    <section>
      <h2>Add an Expense</h2>
      <form id="addExpenseForm">
        <label for="currency">Currency:</label>
        <select id="currency">
          <option value="">Choose Currency</option>
        </select>

        <label for="amount">Amount:</label>
        <input type="number" id="amount" placeholder="Enter amount" />

        <p id="conversionPreview"></p>

        <div class="form-row">
          <div class="form-col">
            <label for="category">Category:</label>
            <select id="category">
              <option value="">Choose Category</option>
            </select>
            <div id="customCategoryInput" style="display:none">
              <input type="text" id="customCategoryText" placeholder="Enter custom category name" />
              <button type="button" id="addCustomCategoryBtn">Add</button>
              <button type="button" id="cancelCustomCategoryBtn">Cancel</button>
            </div>
            <button type="button" id="deleteCustomCategoryBtn" style="display:none">Delete custom category</button>
          </div>
          <div class="form-col">
            <label for="date">Date:</label>
            <input type="date" id="date" placeholder="Enter date" />
          </div>
        </div>

        <label for="note">Note:</label>
        <input type="text" id="note" placeholder="Enter note" />

        <button type="submit">Add Expense</button>
        <p id="errorMessage"></p>
      </form>
    </section>
    <section>
      <h2>Expense List</h2>
      <div id="expenseList"></div>
      <button type="button" id="toggleExpenseList" style="display:none"></button>
    </section>
    <section>
      <h2>Category Breakdown</h2>
      <div id="categoryBreakdown"></div>
    </section>
    <section>
      <h2>Daily Spend</h2>
      <canvas id="dailySpendChart"></canvas>
    </section>
    <div id="noteModal" style="display:none">
      <div id="noteModalBackdrop"></div>
      <div id="noteModalContent">
        <p id="noteModalText"></p>
        <button id="noteModalClose">Close</button>
      </div>
    </div>
    <script type="module" src="app.js"></script>
  </body>
</html>
